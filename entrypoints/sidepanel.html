<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #tabs {
      display: flex;
      gap: 4px;
      padding: 8px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      overflow-x: auto;
      flex-shrink: 0;
    }

    #tabs::-webkit-scrollbar {
      height: 6px;
    }

    #tabs::-webkit-scrollbar-thumb {
      background: #484f58;
      border-radius: 3px;
    }

    .tab {
      padding: 6px 12px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.1s;
    }

    .tab:hover {
      background: #30363d;
    }

    .tab.active {
      background: #238636;
      border-color: #238636;
      color: white;
    }

    .tab .close {
      margin-left: 4px;
      opacity: 0.6;
      font-weight: bold;
    }

    .tab .close:hover {
      opacity: 1;
    }

    #content {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: none;
    }

    iframe.active {
      display: block;
    }

    #empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #8b949e;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="tabs"></div>
  <div id="content">
    <div id="empty">Click a pinned repo or project to open it here</div>
  </div>

  <script type="module">
    let openTabs = [];
    let activeTabId = null;

    // Listen for messages from content script
    chrome.runtime.onMessage.addListener((message, sender, sendResponse) => {
      if (message.type === 'OPEN_IN_SIDEPANEL') {
        openTab(message.name, message.url);
        sendResponse({ success: true });
      }
    });

    function openTab(name, url) {
      // Check if tab already exists
      const existing = openTabs.find(t => t.url === url);
      if (existing) {
        switchToTab(existing.id);
        return;
      }

      // Create new tab
      const tabId = Date.now().toString();
      const tab = {
        id: tabId,
        name: name,
        url: url
      };

      openTabs.push(tab);
      renderTabs();
      createIframe(tab);
      switchToTab(tabId);
    }

    function createIframe(tab) {
      const iframe = document.createElement('iframe');
      iframe.id = `iframe-${tab.id}`;
      iframe.src = tab.url;
      document.getElementById('content').appendChild(iframe);
    }

    function switchToTab(tabId) {
      activeTabId = tabId;
      
      // Update tab styles
      document.querySelectorAll('.tab').forEach(t => {
        t.classList.toggle('active', t.dataset.tabId === tabId);
      });

      // Show/hide iframes
      document.querySelectorAll('iframe').forEach(iframe => {
        iframe.classList.toggle('active', iframe.id === `iframe-${tabId}`);
      });

      // Hide empty state
      document.getElementById('empty').style.display = openTabs.length > 0 ? 'none' : 'flex';
    }

    function closeTab(tabId) {
      openTabs = openTabs.filter(t => t.id !== tabId);
      
      // Remove iframe
      const iframe = document.getElementById(`iframe-${tabId}`);
      if (iframe) iframe.remove();

      // Switch to another tab if this was active
      if (activeTabId === tabId) {
        if (openTabs.length > 0) {
          switchToTab(openTabs[openTabs.length - 1].id);
        } else {
          activeTabId = null;
          document.getElementById('empty').style.display = 'flex';
        }
      }

      renderTabs();
    }

    function renderTabs() {
      const container = document.getElementById('tabs');
      container.innerHTML = openTabs.map(tab => `
        <div class="tab ${tab.id === activeTabId ? 'active' : ''}" data-tab-id="${tab.id}">
          <span>${tab.name}</span>
          <span class="close">×</span>
        </div>
      `).join('');

      // Add click handlers
      container.querySelectorAll('.tab').forEach(tabEl => {
        const tabId = tabEl.dataset.tabId;
        
        tabEl.addEventListener('click', (e) => {
          if (e.target.classList.contains('close')) {
            closeTab(tabId);
          } else {
            switchToTab(tabId);
          }
        });
      });
    }

    // Load pinned items on startup
    async function loadPinnedItems() {
      const data = await chrome.storage.sync.get(['pinnedRepos', 'projects']);
      const repos = data.pinnedRepos || [];
      const projects = data.projects || [];

      // Open all pinned items
      repos.forEach(repo => {
        openTab(repo, `https://github.com/${repo}`);
      });

      projects.forEach(project => {
        openTab(project.name, project.url);
      });
    }

    loadPinnedItems();
  </script>
</body>
</html>
