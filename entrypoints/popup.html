<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GitHub UI Extension</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 500px;
      max-height: 600px;
      overflow-y: auto;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      padding: 16px;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #c9d1d9;
    }

    h2 {
      font-size: 14px;
      font-weight: 600;
      margin: 16px 0 8px 0;
      color: #8b949e;
    }

    .section {
      margin-bottom: 20px;
    }

    input[type="text"] {
      width: 100%;
      padding: 8px 12px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 14px;
      margin-bottom: 8px;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #58a6ff;
    }

    button {
      padding: 8px 16px;
      background: #238636;
      border: 1px solid #2ea043;
      border-radius: 6px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      background: #2ea043;
    }

    .add-form {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .add-form input {
      flex: 1;
      margin-bottom: 0;
    }

    .item-list {
      list-style: none;
    }

    .item {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      margin-bottom: 8px;
      padding: 12px;
    }

    .item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .item-name {
      font-weight: 600;
      font-size: 14px;
    }

    .remove-btn {
      background: transparent;
      border: none;
      color: #f85149;
      cursor: pointer;
      padding: 4px 8px;
      font-size: 16px;
      line-height: 1;
    }

    .remove-btn:hover {
      color: #ff7b72;
    }

    .tabs-section {
      margin-top: 8px;
    }

    .tabs-label {
      font-size: 12px;
      color: #8b949e;
      margin-bottom: 6px;
    }

    .tab-checkboxes {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tab-checkbox {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
    }

    .tab-checkbox input {
      margin: 0;
      cursor: pointer;
    }

    .tab-checkbox label {
      cursor: pointer;
    }

    .project-inputs {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .project-inputs input:first-child {
      flex: 1;
    }

    .project-inputs input:last-child {
      flex: 2;
    }

    .info {
      font-size: 12px;
      color: #8b949e;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #21262d;
    }
  </style>
</head>
<body>
  <h1>GitHub UI Extension</h1>

  <div class="section">
    <h2>Pinned Repositories</h2>
    <div class="add-form">
      <input type="text" id="repo-input" placeholder="owner/repo">
      <button onclick="addRepo()">Add</button>
    </div>
    <ul class="item-list" id="repo-list"></ul>
  </div>

  <div class="section">
    <h2>Projects</h2>
    <div class="project-inputs">
      <input type="text" id="project-name" placeholder="Name">
      <input type="text" id="project-url" placeholder="URL">
    </div>
    <button onclick="addProject()" style="width: 100%; margin-bottom: 12px;">Add Project</button>
    <ul class="item-list" id="project-list"></ul>
  </div>

  <div class="info">
    💡 Select which tabs you want quick links for. They'll appear in the sidebar.
  </div>

  <script type="module">
    const REPO_TABS = ['issues', 'pulls', 'actions', 'projects', 'security', 'insights', 'settings'];

    async function loadData() {
      const data = await chrome.storage.sync.get(['repos', 'projects']);
      return {
        repos: data.repos || [],
        projects: data.projects || []
      };
    }

    async function saveData(repos, projects) {
      await chrome.storage.sync.set({ repos, projects });
      const tabs = await chrome.tabs.query({ url: 'https://github.com/*' });
      tabs.forEach(tab => chrome.tabs.reload(tab.id));
    }

    async function render() {
      const { repos, projects } = await loadData();
      
      const repoList = document.getElementById('repo-list');
      repoList.innerHTML = repos.map((repo, index) => `
        <li class="item">
          <div class="item-header">
            <span class="item-name">${repo.name}</span>
            <button class="remove-btn" onclick="removeRepo(${index})">×</button>
          </div>
          <div class="tabs-section">
            <div class="tabs-label">Quick links:</div>
            <div class="tab-checkboxes">
              ${REPO_TABS.map(tab => `
                <div class="tab-checkbox">
                  <input type="checkbox" id="repo-${index}-${tab}" 
                         ${repo.tabs?.includes(tab) ? 'checked' : ''}
                         onchange="toggleRepoTab(${index}, '${tab}')">
                  <label for="repo-${index}-${tab}">${tab}</label>
                </div>
              `).join('')}
            </div>
          </div>
        </li>
      `).join('') || '<li style="color: #8b949e; font-size: 12px; padding: 8px 0;">No repositories pinned</li>';

      const projectList = document.getElementById('project-list');
      projectList.innerHTML = projects.map((project, index) => `
        <li class="item">
          <div class="item-header">
            <div>
              <div class="item-name">${project.name}</div>
              <div style="font-size: 11px; color: #8b949e; margin-top: 2px;">${project.url}</div>
            </div>
            <button class="remove-btn" onclick="removeProject(${index})">×</button>
          </div>
        </li>
      `).join('') || '<li style="color: #8b949e; font-size: 12px; padding: 8px 0;">No projects added</li>';
    }

    window.addRepo = async function() {
      const input = document.getElementById('repo-input');
      const name = input.value.trim();
      
      if (!name) return;
      if (!name.includes('/')) {
        alert('Please use format: owner/repo');
        return;
      }

      const { repos, projects } = await loadData();
      repos.push({ name, tabs: [] });
      await saveData(repos, projects);
      
      input.value = '';
      render();
    };

    window.removeRepo = async function(index) {
      const { repos, projects } = await loadData();
      repos.splice(index, 1);
      await saveData(repos, projects);
      render();
    };

    window.toggleRepoTab = async function(repoIndex, tab) {
      const { repos, projects } = await loadData();
      const repo = repos[repoIndex];
      
      if (!repo.tabs) repo.tabs = [];
      
      if (repo.tabs.includes(tab)) {
        repo.tabs = repo.tabs.filter(t => t !== tab);
      } else {
        repo.tabs.push(tab);
      }
      
      await saveData(repos, projects);
    };

    window.addProject = async function() {
      const name = document.getElementById('project-name').value.trim();
      const url = document.getElementById('project-url').value.trim();
      
      if (!name || !url) return;

      const { repos, projects } = await loadData();
      projects.push({ name, url });
      await saveData(repos, projects);
      
      document.getElementById('project-name').value = '';
      document.getElementById('project-url').value = '';
      render();
    };

    window.removeProject = async function(index) {
      const { repos, projects } = await loadData();
      projects.splice(index, 1);
      await saveData(repos, projects);
      render();
    };

    render();
  </script>
</body>
</html>
