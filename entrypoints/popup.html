<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 400px;
      min-height: 500px;
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 14px;
      background: #0d1117;
      color: #c9d1d9;
    }

    h1 {
      font-size: 18px;
      margin: 0 0 8px 0;
      font-weight: 600;
    }

    .subtitle {
      color: #8b949e;
      font-size: 12px;
      margin-bottom: 20px;
    }

    .section {
      margin-bottom: 24px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: #f0f6fc;
    }

    .btn {
      background: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      font-weight: 500;
    }

    .btn:hover {
      background: #30363d;
      border-color: #8b949e;
    }

    .btn-primary {
      background: #238636;
      border-color: #238636;
      color: white;
    }

    .btn-primary:hover {
      background: #2ea043;
      border-color: #2ea043;
    }

    .btn-danger {
      background: #da3633;
      border-color: #da3633;
      color: white;
    }

    .btn-danger:hover {
      background: #f85149;
      border-color: #f85149;
    }

    .repo-list {
      border: 1px solid #30363d;
      border-radius: 6px;
      background: #010409;
      max-height: 200px;
      overflow-y: auto;
    }

    .repo-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      border-bottom: 1px solid #21262d;
    }

    .repo-item:last-child {
      border-bottom: none;
    }

    .repo-name {
      font-family: monospace;
      font-size: 13px;
      color: #58a6ff;
    }

    .empty-state {
      padding: 30px;
      text-align: center;
      color: #8b949e;
      font-size: 12px;
    }

    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    input {
      flex: 1;
      background: #0d1117;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      font-family: monospace;
    }

    input:focus {
      outline: none;
      border-color: #58a6ff;
    }

    input::placeholder {
      color: #6e7681;
    }

    .status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 6px;
      font-size: 12px;
      text-align: center;
    }

    .status-success {
      background: #1a2f1a;
      border: 1px solid #238636;
      color: #7ee787;
    }

    .status-error {
      background: #2f1a1a;
      border: 1px solid #da3633;
      color: #ff7b72;
    }

    .footer {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid #30363d;
      text-align: center;
      font-size: 11px;
      color: #6e7681;
    }

    .footer a {
      color: #58a6ff;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>📌 GitHub UI Extension</h1>
  <p class="subtitle">Customize your GitHub homepage sidebar</p>

  <div class="section">
    <div class="section-header">
      <div class="section-title">Pinned Repositories</div>
    </div>
    
    <div class="input-group">
      <input type="text" id="repo-input" placeholder="owner/repo (e.g., facebook/react)">
      <button class="btn btn-primary" id="add-repo">Add</button>
    </div>

    <div id="repo-list" class="repo-list">
      <div class="empty-state">No pinned repositories yet</div>
    </div>
  </div>

  <div class="section">
    <div class="section-header">
      <div class="section-title">Projects (Coming Soon)</div>
    </div>
    <div class="repo-list">
      <div class="empty-state">Project grouping coming in v0.2.0</div>
    </div>
  </div>

  <div id="status"></div>

  <div class="footer">
    Made with frustration & coffee ☕<br>
    <a href="https://github.com/haydencassar/github-ui-extension" target="_blank">View on GitHub</a>
  </div>

  <script type="module">
    // Load and display repos when popup opens
    document.addEventListener('DOMContentLoaded', () => {
      loadRepos();
      
      document.getElementById('add-repo').addEventListener('click', addRepo);
      document.getElementById('repo-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          addRepo();
        }
      });
    });

    async function loadRepos() {
      const result = await chrome.storage.sync.get(['pinnedRepos']);
      const repos = result.pinnedRepos || [];
      
      displayRepos(repos);
    }

    function displayRepos(repos) {
      const repoList = document.getElementById('repo-list');
      
      if (repos.length === 0) {
        repoList.innerHTML = '<div class="empty-state">No pinned repositories yet</div>';
        return;
      }
      
      repoList.innerHTML = '';
      
      repos.forEach(repo => {
        const item = document.createElement('div');
        item.className = 'repo-item';
        item.innerHTML = `
          <span class="repo-name">${repo}</span>
          <button class="btn btn-danger" data-repo="${repo}">Remove</button>
        `;
        
        item.querySelector('button').addEventListener('click', () => removeRepo(repo));
        repoList.appendChild(item);
      });
    }

    async function addRepo() {
      const input = document.getElementById('repo-input');
      const repoString = input.value.trim();
      
      if (!repoString) {
        showStatus('Please enter a repository', 'error');
        return;
      }
      
      if (!repoString.includes('/')) {
        showStatus('Format should be: owner/repo', 'error');
        return;
      }
      
      const [owner, repo] = repoString.split('/');
      if (!owner || !repo) {
        showStatus('Invalid repository format', 'error');
        return;
      }
      
      const result = await chrome.storage.sync.get(['pinnedRepos']);
      const repos = result.pinnedRepos || [];
      
      if (repos.includes(repoString)) {
        showStatus('Repository already pinned', 'error');
        return;
      }
      
      repos.push(repoString);
      await chrome.storage.sync.set({ pinnedRepos: repos });
      
      input.value = '';
      displayRepos(repos);
      showStatus('Repository added!', 'success');
      
      // Reload GitHub tabs to show the change
      refreshGitHubTabs();
    }

    async function removeRepo(repoToRemove) {
      const result = await chrome.storage.sync.get(['pinnedRepos']);
      const repos = result.pinnedRepos || [];
      
      const filtered = repos.filter(repo => repo !== repoToRemove);
      await chrome.storage.sync.set({ pinnedRepos: filtered });
      
      displayRepos(filtered);
      showStatus('Repository removed', 'success');
      
      // Reload GitHub tabs to show the change
      refreshGitHubTabs();
    }

    function showStatus(message, type) {
      const status = document.getElementById('status');
      status.textContent = message;
      status.className = `status status-${type}`;
      
      setTimeout(() => {
        status.textContent = '';
        status.className = 'status';
      }, 3000);
    }

    async function refreshGitHubTabs() {
      const tabs = await chrome.tabs.query({ url: 'https://github.com/*' });
      tabs.forEach(tab => {
        chrome.tabs.reload(tab.id);
      });
    }
  </script>
</body>
</html>
