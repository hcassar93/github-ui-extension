<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 450px;
      min-height: 600px;
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 14px;
      background: #0d1117;
      color: #c9d1d9;
    }

    h1 {
      font-size: 18px;
      margin: 0 0 8px 0;
      font-weight: 600;
    }

    .subtitle {
      color: #8b949e;
      font-size: 12px;
      margin-bottom: 20px;
    }

    .section {
      margin-bottom: 24px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: #f0f6fc;
    }

    .btn {
      background: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      font-weight: 500;
    }

    .btn:hover {
      background: #30363d;
      border-color: #8b949e;
    }

    .btn-primary {
      background: #238636;
      border-color: #238636;
      color: white;
    }

    .btn-primary:hover {
      background: #2ea043;
      border-color: #2ea043;
    }

    .btn-danger {
      background: #da3633;
      border-color: #da3633;
      color: white;
      font-size: 11px;
      padding: 4px 8px;
    }

    .btn-danger:hover {
      background: #f85149;
      border-color: #f85149;
    }

    .item-list {
      border: 1px solid #30363d;
      border-radius: 6px;
      background: #010409;
      max-height: 180px;
      overflow-y: auto;
    }

    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      border-bottom: 1px solid #21262d;
      gap: 8px;
    }

    .item:last-child {
      border-bottom: none;
    }

    .item-name {
      font-family: monospace;
      font-size: 13px;
      color: #58a6ff;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .project-name {
      color: #a371f7;
      font-weight: 500;
    }

    .empty-state {
      padding: 30px;
      text-align: center;
      color: #8b949e;
      font-size: 12px;
    }

    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    input {
      flex: 1;
      background: #0d1117;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      font-family: monospace;
    }

    input:focus {
      outline: none;
      border-color: #58a6ff;
    }

    input::placeholder {
      color: #6e7681;
    }

    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      margin-bottom: 8px;
    }

    .toggle-label {
      font-size: 13px;
      color: #c9d1d9;
    }

    .toggle-description {
      font-size: 11px;
      color: #8b949e;
      margin-top: 2px;
    }

    .toggle-switch {
      position: relative;
      width: 42px;
      height: 24px;
      background: #21262d;
      border-radius: 12px;
      cursor: pointer;
      border: 1px solid #30363d;
      transition: background 0.2s;
    }

    .toggle-switch.active {
      background: #238636;
      border-color: #238636;
    }

    .toggle-knob {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 18px;
      height: 18px;
      background: white;
      border-radius: 50%;
      transition: left 0.2s;
    }

    .toggle-switch.active .toggle-knob {
      left: 20px;
    }

    .status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 6px;
      font-size: 12px;
      text-align: center;
    }

    .status-success {
      background: #1a2f1a;
      border: 1px solid #238636;
      color: #7ee787;
    }

    .status-error {
      background: #2f1a1a;
      border: 1px solid #da3633;
      color: #ff7b72;
    }

    .footer {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid #30363d;
      text-align: center;
      font-size: 11px;
      color: #6e7681;
    }

    .footer a {
      color: #58a6ff;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>📌 GitHub UI Extension</h1>
  <p class="subtitle">Customize your GitHub homepage sidebar</p>

  <div class="section">
    <div class="section-header">
      <div class="section-title">Settings</div>
    </div>
    
    <div class="toggle-container">
      <div>
        <div class="toggle-label">Open links in modal tabs</div>
        <div class="toggle-description">Use iframe tabs instead of navigation</div>
      </div>
      <div class="toggle-switch" id="modal-toggle">
        <div class="toggle-knob"></div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-header">
      <div class="section-title">Pinned Repositories</div>
    </div>
    
    <div class="input-group">
      <input type="text" id="repo-input" placeholder="owner/repo (e.g., facebook/react)">
      <button class="btn btn-primary" id="add-repo">Add</button>
    </div>

    <div id="repo-list" class="item-list">
      <div class="empty-state">No pinned repositories yet</div>
    </div>
  </div>

  <div class="section">
    <div class="section-header">
      <div class="section-title">Projects</div>
    </div>
    
    <div class="input-group">
      <input type="text" id="project-name-input" placeholder="Project name">
      <input type="text" id="project-url-input" placeholder="URL or owner/repo">
      <button class="btn btn-primary" id="add-project">Add</button>
    </div>

    <div id="project-list" class="item-list">
      <div class="empty-state">No projects yet</div>
    </div>
  </div>

  <div id="status"></div>

  <div class="footer">
    Made with frustration & coffee ☕<br>
    <a href="https://github.com/haydencassar/github-ui-extension" target="_blank">View on GitHub</a>
  </div>

  <script type="module">
    document.addEventListener('DOMContentLoaded', () => {
      loadSettings();
      loadRepos();
      loadProjects();
      
      document.getElementById('modal-toggle').addEventListener('click', toggleModalMode);
      document.getElementById('add-repo').addEventListener('click', addRepo);
      document.getElementById('add-project').addEventListener('click', addProject);
      
      document.getElementById('repo-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addRepo();
      });
      
      document.getElementById('project-url-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addProject();
      });
    });

    async function loadSettings() {
      const result = await chrome.storage.sync.get(['modalMode']);
      const toggle = document.getElementById('modal-toggle');
      if (result.modalMode) {
        toggle.classList.add('active');
      }
    }

    async function toggleModalMode() {
      const toggle = document.getElementById('modal-toggle');
      const isActive = toggle.classList.toggle('active');
      
      await chrome.storage.sync.set({ modalMode: isActive });
      showStatus(isActive ? 'Modal mode enabled' : 'Modal mode disabled', 'success');
      refreshGitHubTabs();
    }

    async function loadRepos() {
      const result = await chrome.storage.sync.get(['pinnedRepos']);
      const repos = result.pinnedRepos || [];
      displayRepos(repos);
    }

    async function loadProjects() {
      const result = await chrome.storage.sync.get(['projects']);
      const projects = result.projects || [];
      displayProjects(projects);
    }

    function displayRepos(repos) {
      const repoList = document.getElementById('repo-list');
      
      if (repos.length === 0) {
        repoList.innerHTML = '<div class="empty-state">No pinned repositories yet</div>';
        return;
      }
      
      repoList.innerHTML = '';
      
      repos.forEach(repo => {
        const item = document.createElement('div');
        item.className = 'item';
        item.innerHTML = `
          <span class="item-name">${repo}</span>
          <button class="btn btn-danger">Remove</button>
        `;
        
        item.querySelector('button').addEventListener('click', () => removeRepo(repo));
        repoList.appendChild(item);
      });
    }

    function displayProjects(projects) {
      const projectList = document.getElementById('project-list');
      
      if (projects.length === 0) {
        projectList.innerHTML = '<div class="empty-state">No projects yet</div>';
        return;
      }
      
      projectList.innerHTML = '';
      
      projects.forEach(project => {
        const item = document.createElement('div');
        item.className = 'item';
        item.innerHTML = `
          <span class="item-name project-name">${project.name}</span>
          <button class="btn btn-danger">Remove</button>
        `;
        
        item.querySelector('button').addEventListener('click', () => removeProject(project.name));
        projectList.appendChild(item);
      });
    }

    async function addRepo() {
      const input = document.getElementById('repo-input');
      const repoString = input.value.trim();
      
      if (!repoString) {
        showStatus('Please enter a repository', 'error');
        return;
      }
      
      if (!repoString.includes('/')) {
        showStatus('Format should be: owner/repo', 'error');
        return;
      }
      
      const result = await chrome.storage.sync.get(['pinnedRepos']);
      const repos = result.pinnedRepos || [];
      
      if (repos.includes(repoString)) {
        showStatus('Repository already pinned', 'error');
        return;
      }
      
      repos.push(repoString);
      await chrome.storage.sync.set({ pinnedRepos: repos });
      
      input.value = '';
      displayRepos(repos);
      showStatus('Repository added!', 'success');
      refreshGitHubTabs();
    }

    async function addProject() {
      const nameInput = document.getElementById('project-name-input');
      const urlInput = document.getElementById('project-url-input');
      
      const name = nameInput.value.trim();
      const url = urlInput.value.trim();
      
      if (!name || !url) {
        showStatus('Please enter both name and URL', 'error');
        return;
      }
      
      // Convert owner/repo format to full URL if needed
      let fullUrl = url;
      if (!url.startsWith('http') && url.includes('/')) {
        fullUrl = `https://github.com/${url}`;
      } else if (!url.startsWith('http')) {
        showStatus('URL should be a full URL or owner/repo format', 'error');
        return;
      }
      
      const result = await chrome.storage.sync.get(['projects']);
      const projects = result.projects || [];
      
      if (projects.some(p => p.name === name)) {
        showStatus('Project name already exists', 'error');
        return;
      }
      
      projects.push({ name, url: fullUrl });
      await chrome.storage.sync.set({ projects });
      
      nameInput.value = '';
      urlInput.value = '';
      displayProjects(projects);
      showStatus('Project added!', 'success');
      refreshGitHubTabs();
    }

    async function removeRepo(repoToRemove) {
      const result = await chrome.storage.sync.get(['pinnedRepos']);
      const repos = result.pinnedRepos || [];
      
      const filtered = repos.filter(repo => repo !== repoToRemove);
      await chrome.storage.sync.set({ pinnedRepos: filtered });
      
      displayRepos(filtered);
      showStatus('Repository removed', 'success');
      refreshGitHubTabs();
    }

    async function removeProject(projectName) {
      const result = await chrome.storage.sync.get(['projects']);
      const projects = result.projects || [];
      
      const filtered = projects.filter(p => p.name !== projectName);
      await chrome.storage.sync.set({ projects: filtered });
      
      displayProjects(filtered);
      showStatus('Project removed', 'success');
      refreshGitHubTabs();
    }

    function showStatus(message, type) {
      const status = document.getElementById('status');
      status.textContent = message;
      status.className = `status status-${type}`;
      
      setTimeout(() => {
        status.textContent = '';
        status.className = 'status';
      }, 3000);
    }

    async function refreshGitHubTabs() {
      const tabs = await chrome.tabs.query({ url: 'https://github.com/*' });
      tabs.forEach(tab => {
        chrome.tabs.reload(tab.id);
      });
    }
  </script>
</body>
</html>
